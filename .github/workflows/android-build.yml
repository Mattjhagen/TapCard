name: Android Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TapCard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Write Supabase config
        env:
          SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -n "$SUPABASE_PROJECT_URL" ]; then
            printf 'SUPABASE_PROJECT_URL=%s\nSUPABASE_ANON_PUBLIC=%s\n' \
              "$SUPABASE_PROJECT_URL" "$SUPABASE_ANON_KEY" > .env
            echo "Supabase config written"
          else
            echo "SUPABASE_PROJECT_URL secret not set - building in offline mode"
          fi

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: tapcard-debug-apk
          path: TapCard/app/build/outputs/apk/debug/*.apk
