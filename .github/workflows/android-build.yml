name: Android Build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TapCard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Write Supabase config
        env:
          SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -n "$SUPABASE_PROJECT_URL" ]; then
            printf 'SUPABASE_PROJECT_URL=%s\nSUPABASE_ANON_PUBLIC=%s\n' \
              "$SUPABASE_PROJECT_URL" "$SUPABASE_ANON_KEY" > .env
            echo "Supabase config written"
          else
            echo "SUPABASE_PROJECT_URL secret not set - building in offline mode"
          fi

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: tapcard-debug-apk
          path: TapCard/app/build/outputs/apk/debug/*.apk

      # Rolling public release so the website can link a stable direct-download
      # URL: https://github.com/Mattjhagen/TapCard/releases/download/debug-latest/tapcard-debug.apk
      - name: Publish latest debug APK to rolling release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk /tmp/tapcard-debug.apk
          gh release view debug-latest >/dev/null 2>&1 || \
            gh release create debug-latest --prerelease \
              --title "TapCard Android — latest debug build" \
              --notes "Debug-signed APK auto-published from every push to main. For sideloading and testing; not a Play Store release."
          gh release upload debug-latest /tmp/tapcard-debug.apk --clobber

      # Play Store upload bundle. Only runs on main and only when the signing
      # secrets exist (see PLAY_STORE.md for how to create them).
      - name: Build signed release bundle
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          TAPCARD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          TAPCARD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          TAPCARD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > /tmp/tapcard-upload.keystore
            TAPCARD_KEYSTORE_FILE=/tmp/tapcard-upload.keystore ./gradlew bundleRelease --stacktrace
          else
            echo "ANDROID_KEYSTORE_BASE64 secret not set - skipping signed release bundle"
          fi

      - name: Upload release bundle
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: tapcard-release-aab
          path: TapCard/app/build/outputs/bundle/release/*.aab
          if-no-files-found: ignore
